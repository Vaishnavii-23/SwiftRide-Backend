version: '3.8'

services:
  postgres:
    image: postgis/postgis
    container_name: swiftride-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: swiftride
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis
    container_name: swiftride-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: .
    container_name: swiftride-backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:password@postgres:5433/swiftride
      REDIS_URL: redis://redis:6379
      JWT_SECRET: swiftride_secret_key
      JWT_REFRESH_SECRET: swiftride_refresh_secret
      ORS_API_KEY: ${ORS_API_KEY}
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data: